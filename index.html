<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan Tournament</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;0,800;1,800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #111111; 
  --card: #1f1f1f;
  --card-border: #333333;
  --text: #ffffff;
  --text-muted: #a0a0a0;
  --accent: #FF4B44;
  --row-hover: #2a2a2a;
  --blue-stat: #0045A5;
}

body.light {
  --bg: #ffffff;
  --card: #f9f9f9;
  --card-border: #e0e0e0;
  --text: #111111;
  --text-muted: #666666;
  --accent: #FF4B44;
  --row-hover: #f1f1f1;
  --blue-stat: #0056D2;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
  transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
}

body {
  background: var(--bg);
  color: var(--text);
}

section {
  padding: 40px 20px;
}

.container {
  max-width: 1100px;
  margin: auto;
}

.title {
  font-size: 2rem;
  margin-bottom: 25px;
  font-weight: 800;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 12px;
}

.title::before {
  content: '';
  width: 8px;
  height: 30px;
  background: var(--accent);
  transform: skewX(-15deg);
}

.toggle-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  padding: 8px 18px;
  border: 2px solid var(--card-border);
  background: var(--card);
  color: var(--text);
  cursor: pointer;
  font-weight: 700;
}

.main-match-card, .table-wrapper, .leader-card, .match-card {
  background: var(--card);
  border: 1px solid var(--card-border);
}

.main-match-card {
  padding: 40px;
  text-align: center;
}

.teams-hero {
  font-size: 2rem;
  font-weight: 800;
  text-transform: uppercase;
}

.vs-badge {
  color: var(--accent);
  font-weight: 800;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th, td {
  padding: 16px;
  text-align: center;
}

th {
  text-transform: uppercase;
  font-size: 0.8rem;
  color: var(--text-muted);
  border-bottom: 2px solid var(--card-border);
}

tbody tr:first-child td:first-child {
  background: var(--accent);
  color: white;
  font-weight: 800;
}

tbody tr:hover {
  background: var(--row-hover);
}

.matches-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.match-card {
  padding: 20px;
  text-align: center;
}

.main-footer {
  text-align: center;
  padding: 30px;
  color: var(--text-muted);
  font-size: 12px;
  border-top: 1px solid var(--card-border);
  margin-top: 40px;
}
</style>
</head>

<body>

<button class="toggle-btn" onclick="toggleTheme()">Switch Mode</button>

<section>
  <div class="container">
    <h2 class="title">Featured</h2>
    <div class="main-match-card">
      <div class="teams-hero">
        NASSS RAJA <span class="vs-badge">VS</span> RAJA FC
      </div>
      <p style="margin-top:10px;color:var(--text-muted);font-weight:600;">
        SAT 28 FEB 2026 – 21:00
      </p>
    </div>
  </div>
</section>

<section>
  <div class="container">
    <h2 class="title">Standings</h2>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Pos</th>
            <th>Club</th>
            <th>Played</th>
            <th>Points</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>1</td>
            <td style="text-align:left;">Inter Caves</td>
            <td>7</td>
            <td>20</td>
          </tr>
          <tr>
            <td>2</td>
            <td style="text-align:left;">Noclip</td>
            <td>5</td>
            <td>18</td>
          </tr>
          <tr>
            <td>3</td>
            <td style="text-align:left;">Raja FC</td>
            <td>5</td>
            <td>17</td>
          </tr>
          <tr>
            <td>4</td>
            <td style="text-align:left;">FC Sports</td>
            <td>7</td>
            <td>14</td>
          </tr>
          <tr>
            <td>5</td>
            <td style="text-align:left;">NASSS RAJA</td>
            <td>5</td>
            <td>12</td>
          </tr>
          <tr>
            <td>6</td>
            <td style="text-align:left;">Eagle</td>
            <td>6</td>
            <td>11</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</section>

<section>
<h1>NO matche because the rain </h1>
  </div>
</section>

<div class="main-footer">
  © 2026 Legendary Football Project
</div>

<script>
function toggleTheme(){
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
